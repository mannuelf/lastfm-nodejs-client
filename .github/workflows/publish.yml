name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for JSR OIDC (no token needed)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check versions match
        run: |
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json'));
            const jsr = JSON.parse(require('fs').readFileSync('jsr.json'));
            if (pkg.version !== jsr.version) {
              console.error('Version mismatch: package.json=' + pkg.version + ' jsr.json=' + jsr.version);
              process.exit(1);
            }
            console.log('Versions match: ' + pkg.version);
          "

      - name: Test & lint
        run: pnpm test && pnpm lint
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_BASE_URL: ${{ secrets.LASTFM_API_BASE_URL }}
          LASTFM_USER: ${{ secrets.LASTFM_USER }}
          LASTFM_SHARED_SECRET: ${{ secrets.LASTFM_SHARED_SECRET }}

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Publish to JSR
        run: npx jsr publish
